components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    ApiError:
      properties:
        message:
          description: Описание ошибки.
          type: string
      required:
        - message
      type: object
    ApiErrorResponse:
      allOf:
        - properties:
            errors:
              description: Список ошибок.
              items:
                $ref: '#/components/schemas/ApiError'
              type: array
      required:
        - errors
      type: object
    BarcodeFilterType:
      description: Фильтр по штрих-коду
      example: M000001-00001-1
      type: string
    CreateParcel:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ParcelItem'
          type: array
      required:
        - items
      type: object
    CustomerIdType:
      description: Идентификатор покупателя
      example: '437080'
      type: string
    CustomerOrderNumberType:
      description: Клиентский номер заказа
      example: M12345678-00001
      type: string
    DateTime:
      description: Дата/время в формате RFC3339 с указанием часового пояса
      example: '2024-08-24T14:15:22Z'
      format: date-time
      type: string
    FilterDateTime:
      anyOf:
        - required:
            - from
        - required:
            - to
      description: >
        Фильтр по временному интервалу. Необходимо передать хотя бы одно поле фильтра.


        * from Начало интервала (включительно).

        * to   Конец интервала (не включительно).

      properties:
        from:
          $ref: '#/components/schemas/DateTime'
        to:
          $ref: '#/components/schemas/DateTime'
      type: object
    Order:
      properties:
        created_at:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: |
            Дата и время создания заказа
        customer_id:
          $ref: '#/components/schemas/CustomerIdType'
        customer_order_number:
          $ref: '#/components/schemas/CustomerOrderNumberType'
        cutoff_time:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: >
            Дата и время, до которого необходимо собрать товары в посылки и привезти их на точку drop-off

        delivery_region:
          description: Регион доставки
          example: Республика Татарстан
          type: string
        items:
          description: |
            Список товаров которые необходимо собрать
          items:
            $ref: '#/components/schemas/OrderItem'
          type: array
        order_id:
          $ref: '#/components/schemas/OrderIdType'
        status:
          $ref: '#/components/schemas/OrderStatus'
        warehouse_id:
          $ref: '#/components/schemas/WarehouseIdType'
      required:
        - order_id
        - warehouse_id
        - status
        - cutoff_time
        - created_at
        - customer_order_number
        - customer_id
        - delivery_region
        - items
      type: object
    OrderCancelItemsRequest:
      properties:
        items:
          items:
            $ref: '#/components/schemas/SkuItem'
          type: array
        order_id:
          $ref: '#/components/schemas/OrderIdType'
      required:
        - items
        - order_id
      type: object
    OrderCancelItemsResponse:
      properties:
        order:
          $ref: '#/components/schemas/Order'
      required:
        - order
      type: object
    OrderCancelRequest:
      properties:
        order_id:
          $ref: '#/components/schemas/OrderIdType'
      required:
        - order_id
      type: object
    OrderCancelResponse:
      type: object
    OrderCompleteRequest:
      properties:
        order_id:
          $ref: '#/components/schemas/OrderIdType'
      required:
        - order_id
      type: object
    OrderCompleteResponse:
      properties:
        parcels:
          items:
            $ref: '#/components/schemas/Parcel'
          type: array
      required:
        - parcels
      type: object
    OrderIdType:
      description: Идентификатор сборочного задания
      maxLength: 36
      type: string
    OrderItem:
      properties:
        canceled_quantity:
          description: Кол-во товаров которое было отменено при сборке.
          example: 1
          type: integer
        financial_data:
          $ref: '#/components/schemas/OrderItemFinancialData'
        quantity:
          description: >-
            Кол-во единиц товара которое необходимо собрать.

            Поле отражает актуальное кол-во товара которое необходимо собрать. Если производить отмену товаров, то значение в этом поле будет уменьшаться
          example: 10
          type: integer
        sku_id:
          $ref: '#/components/schemas/SkuIdType'
      required:
        - sku_id
        - quantity
        - financial_data
      type: object
    OrderItemFinancialData:
      properties:
        old_price:
          description: >-
            Старая цена товара. На текущий момент совпадает со значение в поле price.
          example: 30
          type: number
        payment_price:
          description: 'Цена единицы товара, которую заплатил покупатель.'
          example: 30
          type: number
        price:
          description: Цена единицы товара на витрине.
          example: 30
          type: number
      required:
        - old_price
        - price
        - payment_price
      type: object
    OrderParcelsRequest:
      properties:
        auto_complete_order:
          description: |
            Признак, что задание на сборку должно быть автоматически завершено,
            без необходимости вызывать запрос "Подтверждение сборки"
          example: false
          type: boolean
        order_id:
          $ref: '#/components/schemas/OrderIdType'
        parcels:
          items:
            $ref: '#/components/schemas/CreateParcel'
          type: array
      required:
        - parcels
        - order_id
      type: object
    OrderParcelsResponse:
      properties:
        parcels:
          items:
            $ref: '#/components/schemas/Parcel'
          type: array
      required:
        - parcels
      type: object
    OrderStatus:
      description: |
        Статус сборочного задания

        * NEW         - Новый
        * IN_ASSEMBLY - Собирается
        * ASSEMBLED   - Сборка завершена
        * CANCELED    - Отменен
      enum:
        - NEW
        - IN_ASSEMBLY
        - ASSEMBLED
        - CANCELED
      type: string
    OrdersListRequest:
      allOf:
        - $ref: '#/components/schemas/PaginationRequest'
        - properties:
            created_at:
              $ref: '#/components/schemas/FilterDateTime'
            customer_order_number:
              description: Фильтр по клиентским номерам заказов
              items:
                $ref: '#/components/schemas/CustomerOrderNumberType'
              maxItems: 50
              minItems: 1
              type: array
            dir:
              $ref: '#/components/schemas/SortDirection'
            order_id:
              items:
                $ref: '#/components/schemas/OrderIdType'
              maxItems: 50
              minItems: 1
              type: array
            status:
              $ref: '#/components/schemas/OrderStatus'
            warehouse_id:
              description: Фильтр по идентификаторам складов.
              items:
                $ref: '#/components/schemas/WarehouseIdType'
              maxItems: 50
              minItems: 1
