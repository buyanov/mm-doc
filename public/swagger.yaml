openapi: 3.0.3
info:
  title: Magnit B2B Platform API
  description: >-
    Описание API для интеграции с Магнит. События от системы Магнит реализуются на стороне Партнера, остальные методы реализованы на стороне Магнит. Сервис Партнера выступает в роли клиента. Общение происходит на основании pull-push-модели, т.е. сервис Партнера как клиент запрашивает информацию о ресурсе, может создавать/обновлять ресурсы, если это необходимо, получать события от системы Магнит. AuthRequest.client_id и AuthRequest.client_secret выдаются по запросу
  version: 0.1.38
servers:
  - url: 'https://b2b-api.magnit.ru/api'
    description: Основной стенд интеграции.
  - url: 'https://b2b-api-gateway.uat.ya.magnit.ru/api'
    description: Демо стенд для проведения тестирования процессинга заказов.
security:
  - apiKeyAuth: []
tags:
  - name: Товары
    description: Партнерская интеграция с Magnit Market по модели FBS. Товары
  - name: Категории
    description: Партнерская интеграция с Magnit Market по модели FBS. Категории
  - name: Цены
    description: Партнерская интеграция с Magnit Market по модели FBS. Цены
  - name: Цены (v2)
    description: Партнерская интеграция с Magnit Market по модели FBS. Цены (v2)
  - name: Остатки
    description: Партнерская интеграция с Magnit Market по модели FBS. Товары
  - name: Магазины
    description: Партнерская интеграция с Magnit Market по модели FBS. Магазины
  - name: Задания на сборку
    description: Партнерская интеграция с Magnit Market по модели FBS. Задания на сборку
  - name: Отгрузка посылок
    description: Партнерская интеграция с Magnit Market по модели FBS. Отгрузка посылок
paths:
  /api/seller/v1/orders/cancel:
    post:
      description: |
        ⚠️ Задание может быть отменено, до перевода в статус ASSEMBLED.

        ⚠️ Это действие нельзя отменить.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancelRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCancelResponse'
          description: Запрос успешно выполнен
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Отмена задания на сборку
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/orders/cancel-items:
    post:
      description: "Отменяемый товар не должен быть распределен по посылкам. \n\n⚠️ Это действие нельзя отменить.\n"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancelItemsRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCancelItemsResponse'
          description: Актуальные информация о задании на сборку
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Отмена части товаров
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/orders/complete:
    post:
      description: >
        Необходимо вызвать этот метод, чтобы посылки можно было добавить в отгрузку

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCompleteRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCompleteResponse'
          description: Список посылок
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Подтверждение сборки
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/orders/list:
    post:
      description: |
        Возвращает список заданий на сборку за указанный период времени.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersListRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'
          description: Список заданий на сборку
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Список заданий на сборку
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/orders/list/unprocessed:
    post:
      description: >
        Возвращает список необработанных заданий на сборку за указанный период времени.

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrdersUnprocessedRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersUnprocessedResponse'
          description: Список заданий на сборку
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Список необработанных заданий на сборку
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/orders/parcels:
    post:
      description: |
        Позволяет передать разбиение всего задания на посылки.
        Метод можно использовать если задания на сборку находится в статус NEW
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderParcelsRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderParcelsResponse'
          description: Посылки и их идентификаторы
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Передать разбиение на посылки
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/parcels/cancel:
    post:
      description: >
        Метод позволяет отменить собранную посылку. При этом также отменяются товары, находящиеся в ней.






         ⚠️ Это действие нельзя отменить.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcelsCancelRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelsCancelResponse'
          description: Посылка успешно отменена
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Отменить посылку вместе с товарами
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/parcels/create:
    post:
      description: |
        Метод позволяет передать состав одной посылки.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcelsCreateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelsCreateResponse'
          description: Посылка успешно создана
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Создание посылки
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/parcels/get-labels:
    post:
      description: |
        Метод возвращает этикетки для посылок в виде одного файла
      parameters:
        - $ref: '#/components/parameters/DocumentAccept'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcelsLabelsRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelsLabelsResponse'
            application/pdf:
              schema:
                example: |-
                  %PDF-1.3
                  3 0 obj
                  ...
                format: binary
                type: string
          description: Запрос успешно выполнен
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Получить этикетки для посылок
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/parcels/list:
    post:
      description: |
        Возвращает список посылок за указанный период времени.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcelsListRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelsListResponse'
          description: Список посылок
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Список посылок
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/parcels/set-marking:
    post:
      description: >
        Передать маркировку можно до подтверждения сборки задания.


        ⚠️ Маркетплейс не производит проверку и вывод марок из оборота.


        ⚠️ Необходимо передавать маркировку сразу на все единицы товара (т.е. равным quantity этого товара в посылке).

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcelsAddMarkingRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelsAddMarkingResponse'
          description: Запрос успешно выполнен
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Передать маркировку товаров внутри посылки
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/parcels/unpack:
    post:
      description: >
        Метод позволяет удалить посылку. Для этого посылка должна находиться в статусе NEW.


        Товары из удаляемой посылки можно распределить повторно.

      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcelsUnpackRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelsUnpackResponse'
          description: Посылка успешно удалена
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Удаляет посылку
      tags:
        - Задания на сборку
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/shipments/add-parcels:
    post:
      description: |
        Добавляет посылки к формируемой отгрузке.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentAddParcelsRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentAddParcelsResponse'
          description: Актуальный состав отгрузки
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Добавить посылки к отгрузке
      tags:
        - Отгрузка посылок
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/shipments/cancel:
    post:
      description: "Отменяет отгрузку. Отменить отгрузку можно только на статусе CONFIRMED  \n"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentsCancelRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentsCancelResponse'
          description: Состав отгрузки
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Отменить отгрузку
      tags:
        - Отгрузка посылок
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/shipments/confirm:
    post:
      description: "Завершить формирование отгрузки. \n"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentsConfirmRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentsConfirmResponse'
          description: Состав отгрузки
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Подтвердить отгрузку
      tags:
        - Отгрузка посылок
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/shipments/get-documents:
    post:
      description: |
        Возвращает выбранный документ для отгрузки
      parameters:
        - $ref: '#/components/parameters/DocumentAccept'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentGetDocumentsRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentGetDocumentsResponse'
            application/pdf:
              schema:
                example: |-
                  %PDF-1.3
                  3 0 obj
                  ...
                format: binary
                type: string
          description: Документ по отгрузке
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Получить документы по отгрузке
      tags:
        - Отгрузка посылок
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/shipments/list:
    post:
      description: |
        Возвращает список отгрузок за указанный период времени.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentListRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentListResponse'
          description: Список отгрузок
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Список отгрузок
      tags:
        - Отгрузка посылок
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/shipments/remove-parcels:
    post:
      description: |
        Удаляет посылки из формируемой отгрузки.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentRemoveParcelsRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentRemoveParcelsResponse'
          description: Актуальный состав отгрузки
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      summary: Удалить посылки из отгрузки
      tags:
        - Отгрузка посылок
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:orders-processing'
  /api/seller/v1/categories:
    get:
      description: REST эндпоинт для получения списка активных категорий
      responses:
        '200':
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/ExternalSellerCategoryDto'
                type: array
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
          description: Пример ошибочных ответов для всех http-статусов (не 2хх)
      security:
        - apiKeyAuth: []
      summary: Получение списка категорий
      tags:
        - Категории
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:categories'
          - 'mm:b2b:all'
  /api/seller/v1/empty_shops:
    get:
      description: REST эндпоинт для получения списка активных магазинов
      responses:
        '200':
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/ShopDto'
                type: array
          description: OK
        '400':
          content:
            application/json:
              schema:
                type: string
          description: Пример ошибочных ответов для всех http-статусов (не 2хх)
      security:
        - apiKeyAuth: []
      summary: Получение списка магазинов
      tags:
        - Категории
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:all'
          - 'mm:b2b:shops'
  /api/seller/v1/products/defined-characteristics:
    post:
      description: REST эндпоинт для получения списка характеристик
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCharacteristicsRequest'
        required: true
      responses:
        '200':
          content:
            '*/*':
              schema:
                items:
                  $ref: '#/components/schemas/ExternalSellerCharacteristicsDto'
                type: array
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
          description: Пример ошибочных ответов для всех http-статусов (не 2хх)
      security:
        - apiKeyAuth: []
      summary: Получение списка характеристик
      tags:
        - Категории
      x-gateway:
        auth: api_key
        scopes:
          - 'mm:b2b:categories'
          - 'mm:b2b:all'
  /api/seller/v1/products/dictionary:
