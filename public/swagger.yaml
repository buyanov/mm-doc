        sku_filter_list:
          description: Фильтры SKU
          items:
            $ref: '#/components/schemas/CreateSkuFilter'
          type: array
        sku_group_id:
          description: >-
            Идентификатор группы SKU. Укажите одинаковые значения для всех SKU, которые должны быть объединены в одну карточку товара.Формат: длина не более 50 символов, a-zA-Z0-9, а-яА-Я0-9 (кроме ёЁ), допустимы специальные символы .,\/()[]-=_.
          maxLength: 50
          type: string
        title:
          description: >-
            Название, единое для карточки товара. Ограничение: от 3 до 90 символов
          maxLength: 90
          minLength: 3
          type: string
        vat:
          description: 'НДС. Возможные значения: 0, 5, 7, 10, 22, "Не облагается"'
          type: string
        video:
          $ref: '#/components/schemas/ProductVisualEffects'
        weight:
          description: Вес в граммах
          format: int32
          type: integer
        width:
          description: Ширина в мм
          format: int32
          type: integer
      required:
        - category_id
        - currency_code
        - description
        - height
        - length
        - price
        - product_filters_list
        - product_images
        - seller_sku_id
        - shop_id
        - short_description
        - sku_group_id
        - title
        - vat
        - weight
        - width
      type: object
    SkuRequestFilter:
      description: Фильтр для поиска SKU
      properties:
        category_id:
          description: Идентификатор категории
          format: int32
          type: integer
        shop_id:
          description: Идентификатор магазина
          format: int32
          type: integer
      type: object
    SkuWarning:
      description: Расшифровка по незначительным ошибкам
      properties:
        attributes:
          description: Блок с расшифровкой незначительных ошибок при обновлении sku
          items:
            $ref: '#/components/schemas/SkuWarningAttribute'
          type: array
        seller_sku_id:
          description: SKU id продавца
          type: string
        status:
          description: Статус конкретного sku
          type: string
      required:
        - attributes
        - seller_sku_id
        - status
      type: object
    SkuWarningAttribute:
      description: Расшифровка по незначительным ошибкам
      properties:
        attribute:
          description: Проблемный атрибут
          type: string
        message:
          description: Предупреждение
          type: string
      required:
        - attribute
        - message
      type: object
    StockDto:
      description: Данные по остаткам на складе продавца
      properties:
        seller_sku_id:
          description: Идентификатор sku в системе продавца
          example: bdd8c471a3b0a3c1
          type: string
        sku_id:
          description: Идентификатор sku (формирует ММ)
          example: 121
          format: int64
          type: integer
        stock:
          description: Остаток на складе селлера
          example: 1
          format: int64
          type: integer
        warehouse_id:
          description: Идентификатор склада (формирует ММ)
          example: bdd8c471-3dc8-4dd0-a544-30b5a3b0a3c1
          format: uuid
          type: string
      required:
        - stock
        - warehouse_id
      type: object
    StockInfoDetails:
      description: Детальные данные по остаткам
      properties:
        reserved:
          description: Количество зарезервированных товаров на складе
          example: 3
          format: int64
          type: integer
        stock:
          description: Количество товара
          example: 120
          format: int64
          type: integer
        type:
          description: Тип склада
          example: FBS
          type: string
      type: object
    StockInfoResponse:
      description: Данные по остаткам
      properties:
        seller_sku_id:
          description: Идентификатор sku в системе продавца
          example: 30b5a3b0a3c1
          type: string
        sku_id:
          description: Идентификатор sku (формирует ММ)
          example: 11
          format: int64
          type: integer
        stock_info_details:
          items:
            $ref: '#/components/schemas/StockInfoDetails'
          type: array
      type: object
    StockRequest:
      description: Запрос на обновление данные по остаткам
      properties:
        stocks:
          description: Список объектов с данными об остатках
          items:
            $ref: '#/components/schemas/StockDto'
          type: array
      required:
        - stocks
      type: object
    TaskStatusResponse:
      properties:
        count_error:
          description: Количество неуспешно созданных SKU
          format: int32
          type: integer
        count_warning:
          description: Количество предупреждений
          format: int32
          type: integer
        error:
          description: Список ошибок при обработке товаров
          items:
            $ref: '#/components/schemas/ErrorInfo'
          type: array
        status:
          description: >-
            Статус выполнения задачи: CREATED - создана, IN_PROGRESS - выполняется, CANCELLED - отменена, COMPLETED - завершена
          enum:
            - CREATED
            - IN_PROGRESS
            - CANCELLED
            - COMPLETED
          type: string
        total_upload:
          description: Количество успешно загруженных товаров
          format: int32
          type: integer
        warnings:
          description: Список предупреждений
          items:
            $ref: '#/components/schemas/SkuWarning'
          type: array
      type: object
    UpdateSkuDto:
      properties:
        barcode:
          description: Штрихкод SKU
          format: int64
          type: integer
        dimensions:
          $ref: '#/components/schemas/SkuDimensions'
        seller_sku_id:
          description: >-
            Уникальный идентификатор SKU в системе селлера. Длина: до 80 символов. Допустимые символы: латиница (a-zA-Z), кириллица (а-яА-Я, кроме ёЁ), цифры (0-9), некоторые специальные символы .,\/()[]-=_.
          type: string
        sku_filter_list:
          description: Фильтры SKU
          items:
            $ref: '#/components/schemas/UpdateSkuFilter'
          type: array
      required:
        - seller_sku_id
      type: object
    UpdateSkuFilter:
      description: Фильтры SKU
      properties:
        characteristic_id:
          description: Идентификатор справочника
          format: int64
          type: integer
        characteristic_values:
          description: Массив значений фильтра
          items:
            description: Массив значений фильтра
            type: string
          type: array
          uniqueItems: true
      required:
        - characteristic_id
        - characteristic_values
      type: object
    UpdateSkuRequest:
      properties:
        sku_list:
          items:
            $ref: '#/components/schemas/UpdateSkuDto'
          type: array
      type: object
  responses:
    '400':
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiErrorResponse'
      description: Запрос содержит неправильные данные
    '403':
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiErrorResponse'
            type: object
      description: Нет доступа к запрашиваемому ресурсу
    '404':
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiErrorResponse'
            type: object
      description: Запрашиваемый ресурс не найдет
    '500':
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiErrorResponse'
            type: object
      description: Внутренняя ошибка сервера
  parameters:
    DocumentAccept:
      description: |
        Выбранный формат получения ответа (по умолчанию application/json)
      in: header
      name: Accept
      required: false
      schema:
        default: application/json
        enum:
          - application/json
          - application/pdf
        type: string
